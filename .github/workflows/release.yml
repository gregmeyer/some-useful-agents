name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version-or-publish:
    name: Version PR or Publish
    runs-on: ubuntu-latest
    # Gate the ACTUAL publish step behind the npm-publish environment.
    # Required reviewers on that environment must approve before publish runs.
    environment: npm-publish
    permissions:
      contents: write
      pull-requests: write
      # id-token: write is required for npm Trusted Publishing via OIDC.
      # No NPM_TOKEN needed — GitHub's short-lived OIDC token is exchanged
      # with npm directly. Configure the trusted publisher per package at
      # https://www.npmjs.com/package/<pkg>/access
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      # Node 24 ships with npm 11+ natively, which is required for npm Trusted
      # Publishing via OIDC. Using Node 24 here (instead of upgrading npm in-place
      # on Node 22) avoids a known MODULE_NOT_FOUND bug in npm's self-upgrade path.
      # The codebase itself still targets Node 22 (.nvmrc, build-and-test CI),
      # but this release job only builds, tests, and publishes — all Node APIs
      # we use are stable in both 22 and 24.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf  # v1.7.0
        with:
          # When the Release PR is merged and changesets have been consumed,
          # this publishes via trusted publishing. Otherwise opens the PR.
          publish: npx changeset publish
          version: npx changeset version
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
