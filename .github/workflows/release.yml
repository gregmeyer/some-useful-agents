name: Release

on:
  push:
    branches:
      - main

# Supersede any in-flight release run when a newer push lands on main.
#
# Without `cancel-in-progress: true`, every push to main that reaches the
# `npm-publish` environment gate queues behind the previous one. If you
# merge a feature PR but don't immediately click Approve on its release
# run, the next feature merge queues behind it. Merge three in a row and
# the actual release PR's workflow is stuck hours behind a stack of
# stale, unapproved feature-triggered runs (see main branch history
# 2026-04-15 where release run for #50 waited 3h+ and blocked #48's
# real publish).
#
# Superseding is safe for two reasons:
#   1. Each feature-merge run is a no-op until there's a release PR to
#      merge — changesets/action detects no consumed changesets and
#      either opens/updates the Release PR (idempotent) or exits.
#   2. The actual publish step only runs when the "chore: release"
#      commit lands. If a newer push cancels that mid-publish, npm
#      trusted publishing is idempotent per-package: the retry either
#      completes the unpublished ones or no-ops on already-published.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-or-publish:
    name: Version PR or Publish
    runs-on: ubuntu-latest
    # Gate the ACTUAL publish step behind the npm-publish environment.
    # Required reviewers on that environment must approve before publish runs.
    environment: npm-publish
    permissions:
      contents: write
      pull-requests: write
      # id-token: write is required for npm Trusted Publishing via OIDC.
      # No NPM_TOKEN needed — GitHub's short-lived OIDC token is exchanged
      # with npm directly. Configure the trusted publisher per package at
      # https://www.npmjs.com/package/<pkg>/access
      id-token: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0

      # Node 24 ships with npm 11+ natively, which is required for npm Trusted
      # Publishing via OIDC. Using Node 24 here (instead of upgrading npm in-place
      # on Node 22) avoids a known MODULE_NOT_FOUND bug in npm's self-upgrade path.
      # The codebase itself still targets Node 22 (.nvmrc, build-and-test CI),
      # but this release job only builds, tests, and publishes — all Node APIs
      # we use are stable in both 22 and 24.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d  # v1.9.0
        with:
          # When the Release PR is merged and changesets have been consumed,
          # this publishes via trusted publishing. Otherwise opens the PR.
          publish: npx changeset publish
          version: npx changeset version
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
