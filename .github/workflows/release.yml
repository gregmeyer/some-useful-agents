name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version-or-publish:
    name: Version PR or Publish
    runs-on: ubuntu-latest
    # Gate the ACTUAL publish step behind the npm-publish environment.
    # Required reviewers on that environment must approve before publish runs.
    environment: npm-publish
    permissions:
      contents: write
      pull-requests: write
      # id-token: write is required for npm Trusted Publishing via OIDC.
      # No NPM_TOKEN needed — GitHub's short-lived OIDC token is exchanged
      # with npm directly. Configure the trusted publisher per package at
      # https://www.npmjs.com/package/<pkg>/access
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # npm CLI >= 11.5.1 is required for trusted publishing
      - name: Upgrade npm
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # When the Release PR is merged and changesets have been consumed,
          # this publishes via trusted publishing. Otherwise opens the PR.
          publish: npx changeset publish
          version: npx changeset version
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
