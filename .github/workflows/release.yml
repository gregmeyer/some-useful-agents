name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version-or-publish:
    name: Version PR or Publish
    runs-on: ubuntu-latest
    # Gate the ACTUAL publish step behind the npm-publish environment.
    # Required reviewers on that environment must approve before publish runs.
    environment: npm-publish
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # If a Release PR's version bump is on main, publish.
          # Otherwise, open/update a Release PR aggregating pending changesets.
          publish: npx changeset publish
          version: npx changeset version
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
