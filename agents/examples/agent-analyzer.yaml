id: agent-analyzer
name: Agent Analyzer
description: >
  AI-powered agent review with self-correction. Analyzes an agent's YAML,
  validates the suggested improvements against the schema, and fixes any
  errors automatically. Run via "Suggest improvements" on any agent's detail page.
status: active
source: examples

inputs:
  AGENT_YAML:
    type: string
    required: true
    description: The full YAML definition of the agent to analyze.
  FOCUS:
    type: string
    required: false
    default: ""
    description: Optional focus area, e.g. "what variables am I missing to count loop iterations?"
  LAST_RUN_OUTPUT:
    type: string
    required: false
    default: ""
    description: Output from the agent's most recent completed run. Injected automatically by the dashboard.
  DISCOVERY_CATALOG:
    type: string
    required: false
    default: ""
    description: Node types, signal templates, output widgets, available agents, and patterns. Injected at analysis time.

nodes:
  - id: analyze
    type: claude-code
    prompt: |
      You are an expert agent architect reviewing a sua DAG agent.

      IMPORTANT: Respond directly with your analysis. Do NOT use any tools
      (no file reads, no searches, no bash commands). Everything you need
      is provided below in this prompt.

      Analyze the FULL agent holistically — cross-node data flow, dependency
      ordering, input/variable usage, prompt quality, error handling, and
      whether the design achieves its purpose efficiently.

      Look for:
      - Missing variables or inputs that would improve configurability
      - Hardcoded values that should be agent inputs or global variables
      - Missing error handling, timeouts, or retry logic
      - Opportunities to split or merge nodes for clarity
      - Unused or redundant dependencies between nodes
      - Prompt improvements for claude-code nodes
      - Missing or improvable outputWidget declarations
      - Whether the agent would benefit from control-flow nodes (conditional, switch, loop, agent-invoke)
      - Whether a richer signal template would better showcase the output on Pulse
      - Whether existing agents could be invoked as sub-agents via agent-invoke or loop nodes

      NODE & WIDGET DISCOVERY CATALOG:
      {{inputs.DISCOVERY_CATALOG}}

      Use the catalog above to suggest appropriate signal templates, output widgets,
      control-flow patterns, and sub-agent invocations. Always suggest both signal:
      and outputWidget: when the agent produces structured output.

      {{inputs.FOCUS}}

      LAST RUN OUTPUT (if available, use this to identify runtime issues like
      errors, timeouts, unexpected results, or missing data):
      {{inputs.LAST_RUN_OUTPUT}}

      Classify your assessment as exactly one of:
      - NO_IMPROVEMENTS: The agent is well-designed, no changes needed.
      - SUGGESTIONS: Specific improvements that would make the agent better.
      - REWRITE: The fundamental approach or logic should be rethought.

      CRITICAL YAML RULES for the <yaml> section:
      - `inputs` must be an OBJECT (map), not an array. Example:
          inputs:
            MY_VAR:
              type: string
              default: "value"
        NOT:
          inputs:
            - name: MY_VAR
              type: string
      - Input names MUST be UPPERCASE_WITH_UNDERSCORES (e.g. TOPIC, API_URL, MAX_RETRIES).
        Never use lowercase input names.
      - Node ids must be lowercase with hyphens/underscores only (e.g. fetch-data, step-1).
      - Keep the same agent `id` as the original.
      - `type` for inputs must be one of: string, number, boolean, enum.
      - Enum inputs MUST include a non-empty `values` array. Example:
          STYLE:
            type: enum
            values: [haiku, limerick, prose]
            default: haiku
      - Template refs in prompts use double-brace inputs.NAME syntax (not bare NAME or #inputs.NAME).
      - conditional nodes MUST have conditionalConfig with a predicate.
      - switch nodes MUST have switchConfig with field + cases.
      - outputWidget.type must be one of: dashboard, key-value, diff-apply, raw.
      - outputWidget.fields[].type must be one of: text, code, badge, action, metric, stat.
      - outputWidget field names must match keys in the agent's JSON output.

      Respond in EXACTLY this format (keep the XML tags):
      <classification>NO_IMPROVEMENTS | SUGGESTIONS | REWRITE</classification>
      <summary>One sentence summarizing your assessment</summary>
      <details>
      Your detailed analysis. Be specific: name nodes, variables, prompts.
      For multi-node agents, analyze how data flows between nodes.
      </details>
      <yaml>
      If SUGGESTIONS or REWRITE, provide the complete improved YAML.
      Must be valid, keep the same agent id. If NO_IMPROVEMENTS, leave empty.
      </yaml>

      Here is the agent YAML to review:

      {{inputs.AGENT_YAML}}
    maxTurns: 2
    timeout: 120

  - id: validate
    type: shell
    dependsOn:
      - analyze
    command: |
      # Extract <yaml>...</yaml> from the analysis output.
      YAML_BLOCK=$(echo "$UPSTREAM_ANALYZE_RESULT" | sed -n '/<yaml>/,/<\/yaml>/p' | sed '1d;$d')

      if [ -z "$YAML_BLOCK" ] || [ ${#YAML_BLOCK} -lt 10 ]; then
        echo '{"valid":true,"skipped":true,"reason":"No YAML suggestions to validate"}'
        exit 0
      fi

      # Write to temp file and validate with parseAgent.
      TMPFILE=$(mktemp /tmp/sua-validate-XXXXXX.yaml)
      echo "$YAML_BLOCK" > "$TMPFILE"

      RESULT=$(node -e "
        const { parseAgent } = require('$(pwd)/packages/core/dist/agent-yaml.js');
        const { readFileSync } = require('fs');
        try {
          const yaml = readFileSync('$TMPFILE', 'utf-8');
          parseAgent(yaml);
          console.log(JSON.stringify({ valid: true }));
        } catch(e) {
          console.log(JSON.stringify({ valid: false, error: e.message }));
        }
      " 2>/dev/null)

      rm -f "$TMPFILE"
      echo "$RESULT"
    timeout: 15

  - id: fix
    type: claude-code
    dependsOn:
      - analyze
      - validate
    # Skip the fix call entirely when the analyzer's suggested YAML already
    # passes schema validation. Saves a Claude round-trip on the happy path.
    onlyIf:
      upstream: validate
      field: valid
      equals: false
    prompt: |
      IMPORTANT: Respond directly with the corrected response. Do NOT use any
      tools. Everything you need is in this prompt.

      The analyzer's suggested YAML failed schema validation. Your ONLY job is
      to produce a corrected response with the validation issue resolved —
      not to redesign the agent, not to add improvements, not to revisit the
      classification.

      ── VALIDATION ERROR (this is what you must fix) ─────────────
      {{upstream.validate.result}}
      ─────────────────────────────────────────────────────────────

      Strategy:
      1. Locate the exact node / field / line referenced in the error.
      2. Apply the smallest possible change that resolves the named issue.
         If the error says "replace X with Y", do exactly that.
      3. Leave every other part of the YAML untouched.

      Common fix recipes:
      - "Shell nodes access upstream outputs via environment variables, not
        templates" → replace upstream-result template refs with the
        equivalent $UPSTREAM_<NAME>_RESULT env var in the shell command
        (capitalised, dashes → underscores).
      - "Input names must be UPPERCASE_WITH_UNDERSCORES" → uppercase the
        input names AND update every input template ref in prompts to match.
      - "enum type requires a non-empty values array" → add `values: [a, b, c]`.
      - "conditional nodes must have conditionalConfig" → add a predicate block.
      - "switch nodes must have switchConfig" → add field + cases.

      Output the COMPLETE response in the same XML format the analyzer used.
      Copy the analyzer's classification / summary / details VERBATIM — the
      diff in the dashboard depends on those staying stable.

      ANALYZER'S ORIGINAL RESPONSE (with the broken YAML):
      {{upstream.analyze.result}}

      Now respond with:

      <classification>(verbatim from analyzer)</classification>
      <summary>(verbatim from analyzer)</summary>
      <details>(verbatim from analyzer)</details>
      <yaml>
      (the analyzer's YAML with ONLY the validation issue resolved)
      </yaml>
    maxTurns: 4
    timeout: 240
