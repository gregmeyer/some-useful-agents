id: agent-analyzer
name: Agent Analyzer
description: >
  AI-powered agent review with self-correction. Analyzes an agent's YAML,
  validates the suggested improvements against the schema, and fixes any
  errors automatically. Run via "Suggest improvements" on any agent's detail page.
status: active
source: examples

inputs:
  AGENT_YAML:
    type: string
    required: true
    description: The full YAML definition of the agent to analyze.
  FOCUS:
    type: string
    required: false
    default: ""
    description: Optional focus area, e.g. "what variables am I missing to count loop iterations?"

nodes:
  - id: analyze
    type: claude-code
    prompt: |
      You are an expert agent architect reviewing a sua DAG agent.

      Analyze the FULL agent holistically — cross-node data flow, dependency
      ordering, input/variable usage, prompt quality, error handling, and
      whether the design achieves its purpose efficiently.

      Look for:
      - Missing variables or inputs that would improve configurability
      - Hardcoded values that should be agent inputs or global variables
      - Missing error handling, timeouts, or retry logic
      - Opportunities to split or merge nodes for clarity
      - Unused or redundant dependencies between nodes
      - Prompt improvements for claude-code nodes

      {{inputs.FOCUS}}

      Classify your assessment as exactly one of:
      - NO_IMPROVEMENTS: The agent is well-designed, no changes needed.
      - SUGGESTIONS: Specific improvements that would make the agent better.
      - REWRITE: The fundamental approach or logic should be rethought.

      CRITICAL YAML RULES for the <yaml> section:
      - `inputs` must be an OBJECT (map), not an array. Example:
          inputs:
            MY_VAR:
              type: string
              default: "value"
        NOT:
          inputs:
            - name: MY_VAR
              type: string
      - Input names MUST be UPPERCASE_WITH_UNDERSCORES (e.g. TOPIC, API_URL, MAX_RETRIES).
        Never use lowercase input names.
      - Node ids must be lowercase with hyphens/underscores only (e.g. fetch-data, step-1).
      - Keep the same agent `id` as the original.
      - `type` for inputs must be one of: string, number, boolean, enum.
      - Enum inputs MUST include a non-empty `values` array. Example:
          STYLE:
            type: enum
            values: [haiku, limerick, prose]
            default: haiku
      - Template refs in prompts use double-brace inputs.NAME syntax (not bare NAME or #inputs.NAME).
      - conditional nodes MUST have conditionalConfig with a predicate.
      - switch nodes MUST have switchConfig with field + cases.

      Respond in EXACTLY this format (keep the XML tags):
      <classification>NO_IMPROVEMENTS | SUGGESTIONS | REWRITE</classification>
      <summary>One sentence summarizing your assessment</summary>
      <details>
      Your detailed analysis. Be specific: name nodes, variables, prompts.
      For multi-node agents, analyze how data flows between nodes.
      </details>
      <yaml>
      If SUGGESTIONS or REWRITE, provide the complete improved YAML.
      Must be valid, keep the same agent id. If NO_IMPROVEMENTS, leave empty.
      </yaml>

      Here is the agent YAML to review:

      {{inputs.AGENT_YAML}}
    maxTurns: 3
    timeout: 120

  - id: validate
    type: shell
    dependsOn:
      - analyze
    command: |
      # Extract <yaml>...</yaml> from the analysis output.
      YAML_BLOCK=$(echo "$UPSTREAM_ANALYZE_RESULT" | sed -n '/<yaml>/,/<\/yaml>/p' | sed '1d;$d')

      if [ -z "$YAML_BLOCK" ] || [ ${#YAML_BLOCK} -lt 10 ]; then
        echo '{"valid":true,"skipped":true,"reason":"No YAML suggestions to validate"}'
        exit 0
      fi

      # Write to temp file and validate with parseAgent.
      TMPFILE=$(mktemp /tmp/sua-validate-XXXXXX.yaml)
      echo "$YAML_BLOCK" > "$TMPFILE"

      RESULT=$(node -e "
        const { parseAgent } = require('$(pwd)/packages/core/dist/agent-yaml.js');
        const { readFileSync } = require('fs');
        try {
          const yaml = readFileSync('$TMPFILE', 'utf-8');
          parseAgent(yaml);
          console.log(JSON.stringify({ valid: true }));
        } catch(e) {
          console.log(JSON.stringify({ valid: false, error: e.message }));
        }
      " 2>/dev/null)

      rm -f "$TMPFILE"
      echo "$RESULT"
    timeout: 15

  - id: fix
    type: claude-code
    dependsOn:
      - analyze
      - validate
    onlyIf:
      upstream: validate
      field: valid
      equals: false
    prompt: |
      The agent analyzer suggested improvements but the suggested YAML has
      validation errors. Fix the YAML so it passes schema validation.

      VALIDATION ERROR:
      {{upstream.validate.result}}

      ORIGINAL ANALYSIS (with the broken YAML):
      {{upstream.analyze.result}}

      Fix ONLY the YAML errors identified above. Keep all the analysis text
      (classification, summary, details) exactly as-is. Output the complete
      corrected response in the same XML format:

      <classification>same as original</classification>
      <summary>same as original</summary>
      <details>same as original</details>
      <yaml>
      The FIXED YAML that passes validation. Apply these rules:
      - Input names: UPPERCASE_WITH_UNDERSCORES
      - inputs: must be an object/map, not an array
      - enum inputs: must have a non-empty `values` array
      - Template refs: use double-brace inputs.NAME syntax, not bare NAME
      - conditional nodes: must have conditionalConfig
      - switch nodes: must have switchConfig
      - Keep the same agent id as the original
      </yaml>
    maxTurns: 2
    timeout: 90
