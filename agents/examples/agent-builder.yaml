id: agent-builder
name: Agent Builder
description: >
  Goal-driven agent wizard. Describe what you want your agent to do in plain
  language, and this agent designs a complete DAG with the right nodes, tools,
  inputs, and wiring. Self-correcting: validates the YAML and fixes errors
  automatically. Run via "Build from goal" on the agents page.
status: active
source: examples

inputs:
  GOAL:
    type: string
    required: true
    description: Natural language description of what the agent should do.
  FOCUS:
    type: string
    required: false
    default: ""
    description: Optional constraints or preferences (e.g. "use shell nodes only", "schedule daily").
  AVAILABLE_TOOLS:
    type: string
    required: false
    default: ""
    description: Dynamically injected tool catalog. Populated by the dashboard at build time.
  DISCOVERY_CATALOG:
    type: string
    required: false
    default: ""
    description: Node types, signal templates, output widgets, available agents, and architecture patterns. Injected at build time.

nodes:
  - id: design
    type: claude-code
    prompt: |
      You are an expert agent architect for the sua agent platform.

      Design a complete agent based on the user's goal. The agent should be a
      DAG of nodes that accomplishes the goal using the available tools.

      USER'S GOAL:
      {{inputs.GOAL}}

      {{inputs.FOCUS}}

      AVAILABLE TOOLS (use these as node types or tool references):
      {{inputs.AVAILABLE_TOOLS}}

      NODE & WIDGET DISCOVERY CATALOG:
      {{inputs.DISCOVERY_CATALOG}}

      SIGNAL BLOCK:
      Every agent MUST include a signal: block. Pick the best template from the catalog above.
      The mapping maps dot-paths from the agent's structured output to template slots.
      Use "result" to reference the full raw output. Use literal strings for static labels.
      Always include both format: (text/number/table/json/chart) and template: fields.
      Always include outputWidget: when the agent produces structured JSON output.
      For agent-invoke and loop nodes, use agents listed in AVAILABLE AGENTS above.

      DESIGN GUIDELINES:
      - DECOMPOSE. If the goal has 3+ logical stages (fetch / transform / write), emit 3+ nodes — one per stage. The dashboard shows each stage's output independently and lets users replay individual stages with tweaked code. Collapsing into one node throws that away.
      - Use shell nodes for deterministic work (curl, jq, file ops).
      - Use claude-code nodes for judgment calls (analysis, summarization, decisions).
      - Wire nodes with dependsOn. Downstream nodes access upstream output via:
        Shell: $UPSTREAM_<NODEID>_RESULT (env var, uppercase, hyphens→underscores)
        Claude: upstream.<nodeId>.result wrapped in double-braces (template ref)
      - Declare inputs for any value the user might want to change at run time:
        URLs, API keys (mark as secrets instead), thresholds, output paths.
      - DECLARE outputs. If your final node emits structured JSON, add a top-level `outputs:` block listing the field names with types. Names use lowercase_snake_case. This is documentation for cross-agent composition, not runtime enforcement.
      - Set reasonable timeouts (shell: 30-60s, claude-code: 60-120s).
      - Add a description that explains what the agent does.
      - Shape output as JSON when using metric/table/status templates so field extraction works.

      CRITICAL YAML RULES:
      - Agent id: lowercase with hyphens only (e.g. job-scraper, daily-report).
      - Node ids: lowercase with hyphens/underscores only.
      - Input names: UPPERCASE_WITH_UNDERSCORES (e.g. TARGET_URL, MAX_RESULTS).
      - Output names (in top-level outputs:): lowercase_snake_case.
      - inputs must be an OBJECT/map, not an array.
      - Enum inputs must have a non-empty `values` array.
      - Shell nodes access inputs via $ENV_VARS (e.g. $TARGET_URL), NEVER double-brace templates.
      - Claude-code nodes access inputs via DOUBLE-BRACE syntax with NO SPACES inside the braces.
        Format: open-brace open-brace inputs.NAME close-brace close-brace.
        WRONG and broken: a literal space between the two opening braces — the parser doesn't trim and the lookup silently returns empty string. Always emit the braces with no spaces.
      - Shell nodes access upstream output via $UPSTREAM_<NODEID>_RESULT env vars.
      - Claude-code nodes access upstream output via double-brace syntax with the form upstream.<nodeId>.result (or upstream.<nodeId>.<jsonField> for dot-path extraction).
      - conditional nodes must have conditionalConfig with a predicate.
      - switch nodes must have switchConfig with field + cases.
      - source: must be "local" (not "examples" or "community").

      OUTPUT WIDGET FIELD RULES (most common bug):
      Each entry in outputWidget.fields has EXACTLY these keys:
        name:  string  — THE JSON KEY in the agent's final-node result. NOT a label.
        type:  string  — one of text | code | badge | action | metric | stat | preview
        label: string  — OPTIONAL human-readable label (defaults to name)
      DO NOT use `source:`, `path:`, `from:`, or `key:` — these are silently dropped and the widget renders empty.
      If the final node emits {"file": "x.md", "count": 5}, the widget fields are:
        - name: file       (NOT name: "Saved to" with source: file)
          label: Saved to
          type: code
        - name: count
          label: Stories
          type: metric

      SIGNAL TEMPLATE RULES:
      - signal.template MUST be one of the names listed above (metric, time-series, text-headline, text-image, image, table, status, media, comparison, key-value, story, funnel).
      - signal.title is a literal string. Do NOT use expression syntax like "'Weather: ' + output.city".
      - signal.mapping values are field names or "result" — not expressions.

      ARCHITECTURE PATTERNS:
      Use the patterns from the discovery catalog above. Key tips:
      - Conditional Router: use conditional node + onlyIf edge conditions for branching.
      - Loop + Invoke: use loop node with loopConfig to process arrays via sub-agents.
      - Self-Correcting: validate LLM output with a shell node, fix with onlyIf on failure.
      - Always consider whether the goal benefits from control-flow nodes (conditional, switch, loop).

      Respond in EXACTLY this format:
      <yaml>
      The complete agent YAML. Must be valid and parseable.
      </yaml>
    maxTurns: 3
    timeout: 120

  - id: validate
    type: shell
    dependsOn:
      - design
    command: |
      YAML_BLOCK=$(echo "$UPSTREAM_DESIGN_RESULT" | sed -n '/<yaml>/,/<\/yaml>/p' | sed '1d;$d')

      if [ -z "$YAML_BLOCK" ] || [ ${#YAML_BLOCK} -lt 10 ]; then
        echo '{"valid":false,"error":"No YAML block found in design output"}'
        exit 0
      fi

      TMPFILE=$(mktemp /tmp/sua-validate-XXXXXX.yaml)
      echo "$YAML_BLOCK" > "$TMPFILE"

      RESULT=$(node -e "
        const { parseAgent } = require('$(pwd)/packages/core/dist/agent-yaml.js');
        const { readFileSync } = require('fs');
        try {
          const yaml = readFileSync('$TMPFILE', 'utf-8');
          const agent = parseAgent(yaml);
          console.log(JSON.stringify({ valid: true, agentId: agent.id, agentName: agent.name }));
        } catch(e) {
          console.log(JSON.stringify({ valid: false, error: e.message }));
        }
      " 2>/dev/null)

      rm -f "$TMPFILE"
      echo "$RESULT"
    timeout: 15

  - id: fix
    type: claude-code
    dependsOn:
      - design
      - validate
    onlyIf:
      upstream: validate
      field: valid
      equals: false
    prompt: |
      The agent builder designed an agent but the YAML has validation errors.
      Fix the YAML so it passes schema validation.

      VALIDATION ERROR:
      {{upstream.validate.result}}

      ORIGINAL DESIGN:
      {{upstream.design.result}}

      Fix ONLY the YAML errors. Output the corrected YAML in the same format:
      <yaml>
      The FIXED YAML that passes validation.
      </yaml>
    maxTurns: 2
    timeout: 90
