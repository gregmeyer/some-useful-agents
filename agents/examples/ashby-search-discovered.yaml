# Ashby Search Discovered — discover-then-bulk-summarise composition.
#
# Composition shape:
#   1. agent-invoke ashby-discover     → produces companies[] {slug, ...}
#   2. shell (Python)                  → fetches Ashby API for each
#                                         discovered slug, trims fields
#   3. claude-code                     → single bulk-summarise across
#                                         all companies, structured JSON
#                                         output for the ai-template widget
#
# Why one summarise instead of loop[ashby-job-finder per slug]?
#
# The loop + agent-invoke composition is the right pattern when per-item
# work is genuinely independent (e.g. generate an image per item, write a
# file per item, post a comment per item — each iteration produces a
# distinct side-effect). When the per-item work is "filter / extract from
# this list," an LLM does it cheaper, faster, and within rate limits in
# one bulk call than in N sequential sub-claude invocations.
#
# Rule of thumb:
#   loop + agent-invoke   → side-effecting per-item work
#   bulk-summarise         → filtering/extraction across a discovered set
#
# (For an explicit demo of loop + agent-invoke composition, see
# ashby-job-finder.yaml's docstring — that agent IS loop-invokable, and
# orchestrators that need per-company side-effects should compose it via
# `loopConfig.agentId: ashby-job-finder` with inputMapping.)
#
# Run:
#   sua workflow run ashby-search-discovered
#   sua workflow run ashby-search-discovered --input JOB_QUERY="staff engineer" --input TOPIC=fintech
id: ashby-search-discovered
name: Ashby Search Discovered
description: |
  Discovers companies hiring on Ashby (via ashby-discover), fetches each
  one's job board in a single shell pass, then bulk-summarises matches
  across all companies into one structured ai-template widget.
status: draft
source: local
mcp: false
inputs:
  JOB_QUERY:
    type: string
    default: senior product manager
    description: Role to filter for across all discovered companies.
  TOPIC:
    type: string
    default: ""
    description: Optional topic to narrow the discovery search (e.g. "fintech", "ai").
  MAX_COMPANIES:
    type: number
    default: 8
    description: Cap on discovered companies to fetch (each is one HTTP call).
outputs:
  headline:
    type: string
  total_matches:
    type: number
  companies_searched:
    type: number
  matches:
    type: array
    description: Flat array of {company, title, team, location, type, url} for every matching role
nodes:
  - id: discover
    type: agent-invoke
    agentInvokeConfig:
      agentId: ashby-discover
      inputMapping:
        TOPIC: "{{inputs.TOPIC}}"
        MAX_RESULTS: "15"
  - id: fetch-and-filter
    type: shell
    dependsOn: [discover]
    command: |
      set -e
      # Filter deterministically in Python (case-insensitive, partial-title
      # match) so the summariser only sees pre-filtered hits. This keeps
      # the claude prompt small + accurate — claude is good at prose, not
      # at scanning hundreds of job titles for keyword matches without
      # losing count.
      python3 << 'PYEOF'
      import json, os, urllib.request, urllib.error

      try:
          cap = int(os.environ.get("MAX_COMPANIES", "8"))
      except ValueError:
          cap = 8
      query = (os.environ.get("JOB_QUERY") or "").strip().lower()

      disc = json.loads(os.environ["UPSTREAM_DISCOVER_RESULT"])
      companies = (disc.get("companies") or [])[:cap]

      out = []
      total_searched = 0
      total_matches = 0
      for c in companies:
          slug = c.get("slug")
          if not slug:
              continue
          total_searched += 1
          url = f"https://api.ashbyhq.com/posting-api/job-board/{slug}"
          req = urllib.request.Request(url, headers={
              "User-Agent": "Mozilla/5.0 sua-agent",
              "Accept": "application/json",
          })
          try:
              with urllib.request.urlopen(req, timeout=12) as resp:
                  data = json.loads(resp.read().decode("utf-8", errors="replace"))
              jobs = data.get("jobs") or data.get("jobPostings") or []
              matches = []
              for j in jobs:
                  title = (j.get("title") or j.get("name") or "")
                  if query and query not in title.lower():
                      continue
                  matches.append({
                      "company": slug,
                      "title": title,
                      "team": j.get("team") or j.get("department") or "",
                      "location": j.get("location") or j.get("locationName") or "",
                      "type": j.get("employmentType") or "",
                      "url": j.get("jobUrl") or f"https://jobs.ashbyhq.com/{slug}/{j.get('id', '')}",
                  })
              total_matches += len(matches)
              out.append({"slug": slug, "found": True, "total_open": len(jobs), "match_count": len(matches), "matches": matches})
          except Exception as e:
              out.append({"slug": slug, "found": False, "reason": str(e)[:120]})
      with_matches = sum(1 for c in out if c.get("match_count", 0) > 0)
      print(json.dumps({
          "query": query,
          "companies_searched": total_searched,
          "companies_with_matches": with_matches,
          "total_matches": total_matches,
          "per_company": out,
      }))
      PYEOF
    timeout: 180
  - id: summarise
    type: claude-code
    dependsOn: [fetch-and-filter]
    prompt: |
      Frame already-filtered Ashby job-search results as a structured response.

      IMPORTANT: Do not use any tools (no Bash, no Python, no file reads). The
      data below has already been deterministically filtered for matches; read
      it directly and emit the JSON response. Tool use forces a second turn and
      we run with maxTurns: 1.

      USER QUERY: {{inputs.JOB_QUERY}}
      TOPIC FILTER: {{inputs.TOPIC}}

      DATA — already filtered to matching jobs only. Trustworthy counts:
      {{upstream.fetch-and-filter.result}}

      Concatenate every per_company[*].matches[] entry into a flat matches[]
      array (preserving order), and emit ONLY this JSON object (no markdown,
      no fences, no commentary):

      {
        "headline": "<short, e.g. '<total_matches> <query> matches across <companies_with_matches> of <companies_searched> companies'>",
        "total_matches": <copy of total_matches from data>,
        "companies_searched": <copy of companies_searched from data>,
        "matches": [<concatenated entries from per_company[*].matches[]>]
      }

      If total_matches is 0, set matches to [] and headline to "No <query> roles across <companies_searched> companies".
    maxTurns: 1
    timeout: 240
signal:
  title: Ashby (discovered)
  icon: 🧭
  template: text-headline
  mapping:
    headline: headline
  refresh: 24h
  size: 2x1
outputWidget:
  type: ai-template
  template: |
    <div style="font-family: system-ui, sans-serif; padding: 1rem;">
      <h2 style="margin: 0 0 0.25rem 0; font-size: 1.25rem;">{{outputs.headline}}</h2>
      <p style="margin: 0 0 1rem 0; color: #666; font-size: 0.9rem;">
        Searched {{outputs.companies_searched}} discovered companies, found {{outputs.total_matches}} matching roles.
      </p>
      {{#if outputs.matches}}
      <table style="width: 100%; border-collapse: collapse; font-size: 0.85rem;">
        <thead>
          <tr style="border-bottom: 2px solid #e2e8f0; text-align: left;">
            <th style="padding: 0.5rem;">Company</th>
            <th style="padding: 0.5rem;">Title</th>
            <th style="padding: 0.5rem;">Team</th>
            <th style="padding: 0.5rem;">Location</th>
            <th style="padding: 0.5rem;">Apply</th>
          </tr>
        </thead>
        <tbody>
          {{#each outputs.matches as item}}
          <tr style="border-bottom: 1px solid #e2e8f0;">
            <td style="padding: 0.5rem; font-weight: 500;">{{item.company}}</td>
            <td style="padding: 0.5rem;">{{item.title}}</td>
            <td style="padding: 0.5rem;">{{item.team}}</td>
            <td style="padding: 0.5rem;">{{item.location}}</td>
            <td style="padding: 0.5rem;"><a href="{{item.url}}" target="_blank" style="color: #2563eb;">Apply →</a></td>
          </tr>
          {{/each}}
        </tbody>
      </table>
      {{/if}}
      {{#unless outputs.matches}}
      <p style="color: #888; font-style: italic;">No matching roles found.</p>
      {{/unless}}
    </div>
  controls:
    - type: replay
      label: Re-run
      inputs:
        - JOB_QUERY
        - TOPIC
        - MAX_COMPANIES
