id: daily-summary
name: Daily Summary
description: >
  Summarizes today's agent activity: how many runs, which agents ran,
  what succeeded and what failed. Signal tile shows the summary on Pulse.
status: active
source: examples

signal:
  title: Today's Activity
  icon: "\uD83D\uDCCA"
  template: story
  mapping:
    what_changed: agents
    time_period: Today
    what_it_means: result
  refresh: 1h
  size: 2x1
  accent: blue

outputWidget:
  type: dashboard
  fields:
    - name: total
      label: Runs Today
      type: metric
    - name: completed
      label: Completed
      type: stat
    - name: failed
      label: Failed
      type: stat
    - name: agents
      label: Active Agents
      type: text

nodes:
  - id: gather
    type: shell
    command: |
      # Count today's runs from the runs database.
      DATE_PREFIX=$(date -u +%Y-%m-%d)
      if [ -f data/runs.db ]; then
        node --experimental-strip-types -e "
          import { DatabaseSync } from 'node:sqlite';
          const db = new DatabaseSync('data/runs.db');
          const today = '${DATE_PREFIX}';
          const runs = db.prepare(\"SELECT agentName, status FROM runs WHERE startedAt >= ? || 'T00:00:00Z'\").all(today);
          const total = runs.length;
          const ok = runs.filter(r => r.status === 'completed').length;
          const fail = runs.filter(r => r.status === 'failed').length;
          const agents = [...new Set(runs.map(r => r.agentName))];
          console.log(JSON.stringify({
            total: String(total),
            completed: String(ok),
            failed: String(fail),
            agents: agents.length > 0 ? agents.join(', ') : 'none'
          }));
        " 2>/dev/null || echo '{"total":"?","completed":"?","failed":"?","agents":"Could not read database"}'
      else
        echo '{"total":"0","completed":"0","failed":"0","agents":"No runs database found"}'
      fi
    timeout: 15
