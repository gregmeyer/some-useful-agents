# Inbox Triage — joins the conversation thread on an inbox message and
# emits a concrete recommendation.
#
# Invoked by `POST /inbox/:id/triage` (and auto-fired by the
# `/inbox/:id/respond` handler whenever the user posts a reply). The
# dashboard parses the agent's `<plan>{...}</plan>` block, appends the
# recommendation as a `triage`-role response to the message's
# inbox_responses thread, and (if `verifyHint` is set) holds it for
# the future verification loop.

id: inbox-triage
name: Inbox Triage
description: >
  Reads an inbox message (title, body, context, conversation so far) and
  recommends the next concrete action. Joins the conversation thread.
status: active
source: examples

# Triage should land in seconds, not minutes — fail fast if the LLM
# stalls so the modal's "thinking..." indicator doesn't lie indefinitely.
timeoutSec: 60

inputs:
  MESSAGE_ID:
    type: string
    required: true
    description: Inbox message id (uuid) so the route can match the response back.
  MESSAGE_TITLE:
    type: string
    required: true
    description: The message title from the producer.
  MESSAGE_BODY:
    type: string
    required: true
    description: >
      The producer's short markdown summary — the ORIGINAL request that
      opened the thread. Frozen at creation; it does NOT change as the
      conversation evolves. Treat it as background, not current intent.
  CURRENT_REQUEST:
    type: string
    required: false
    default: ""
    description: >
      The operator's most recent real ask in the thread — the
      AUTHORITATIVE current intent. Equals MESSAGE_BODY on the first
      triage turn, but after the operator replies it is their latest
      message. When CURRENT_REQUEST and MESSAGE_BODY disagree, follow
      CURRENT_REQUEST — the operator has pivoted.
  NOW:
    type: string
    required: false
    default: ""
    description: >
      Current wall-clock time as ISO 8601 with the operator's local UTC
      offset (e.g. 2026-06-14T14:50:00-07:00). Use it to resolve relative
      times the operator gives ("before 4:30pm today", "tomorrow 9am",
      "in 2 hours") into an absolute ISO 8601 timestamp for agents that
      take a due date.
  MESSAGE_PRIORITY:
    type: string
    required: true
    description: 'high | medium | low — sets urgency of the recommendation.'
  MESSAGE_SOURCE:
    type: string
    required: true
    description: 'run-failure | permission-request | cadence | manual.'
  CONTEXT_JSON:
    type: string
    required: false
    default: ""
    description: >
      Structured producer payload (failed-run details, blocked host,
      stale-agent list, etc.). Parse if useful.
  CONVERSATION:
    type: string
    required: false
    default: ""
    description: >
      The conversation thread to date, one entry per line as
      `[ROLE] body`. Empty on the first triage of a fresh message.
  ALLOWED_SUB_AGENTS:
    type: string
    required: false
    default: ""
    description: >
      Comma-separated list of agent ids the triage agent may propose
      running on the operator's behalf (e.g. "suggest-improvements").
      Proposals targeting an id not in this list are refused at the
      route layer with a visible note in the conversation. Empty means
      the triage agent is text-only and must not propose `actions`.
  AGENT_CATALOG:
    type: string
    required: false
    default: ""
    description: >
      Trimmed JSON snapshot of the installed agent catalog, newest first:
      {"agents":[{id,name,description,tags,createdAt}], "truncated"?:N}.
      Lets triage answer recency / "what does agent X do" questions
      directly (with a link) instead of dispatching agent-catalog-search.
  RUNNABLE_AGENT_SPECS:
    type: string
    required: false
    default: ""
    description: >
      JSON array of runnable sub-agent specs with exact input names,
      types, defaults, and descriptions. Use this when proposing
      actions so installed agents are called with their real input
      keys instead of guessed names.
  RUNNABLE_CANDIDATES:
    type: string
    required: false
    default: ""
    description: >
      Comma-separated ids of installed agents you may PROPOSE running
      that have not been granted inbox-run permission yet. Proposing one
      becomes an approval-gated "Enable & run": the operator's approval
      grants permission and runs it. Never dead-end with "I can't run it"
      when the target is here.
  RUNNABLE_CANDIDATE_SPECS:
    type: string
    required: false
    default: ""
    description: >
      JSON array of input specs for RUNNABLE_CANDIDATES, same shape as
      RUNNABLE_AGENT_SPECS.
  SOURCE_PLAYBOOK:
    type: string
    required: false
    default: ""
    description: >
      The "what to recommend" guidance for THIS thread's source only
      (run-failure / permission-request / cadence / manual). Injected by
      the inbox route from agents/examples/inbox-triage/playbooks/<source>.md.
  TRIAGE_KERNEL:
    type: string
    required: false
    default: ""
    description: >
      Shared triage mechanics — voice, action-proposal rules, and the exact
      <plan> output schema. Injected by the inbox route from
      agents/examples/inbox-triage/kernel.md (one source of truth, coupled
      to the route's <plan> parser).

nodes:
  - id: triage
    type: llm-prompt
    # A 0-exit result that doesn't contain a <plan> block is a fallback-worthy
    # failure (invalid_output) — escalate the provider waterfall to a stronger
    # model instead of accepting useless output from a weak one.
    outputContract:
      mustMatch: '<plan>[\s\S]*?</plan>'
      description: a <plan> block
    prompt: |
      You are the Inbox Triage agent for the sua agent platform. The
      operator opened an inbox message and either explicitly asked for
      a triage recommendation, or just posted a reply that the system
      auto-routed to you. Read the rules + catalog below, then the
      THIS THREAD section at the very end, and return ONE concrete,
      actionable recommendation as a single <plan> block. Keep it
      tight — operators are skimming, not reading essays.

      {{inputs.TRIAGE_KERNEL}}

      ════════════════════════════════════════════════════════════════
      AGENTS YOU MAY RUN
      ════════════════════════════════════════════════════════════════

      Agents you may propose running on the operator's behalf (may be empty):
      {{inputs.ALLOWED_SUB_AGENTS}}

      Installed agent catalog — newest first (may be empty):
      {{inputs.AGENT_CATALOG}}

      Runnable sub-agent specs with exact input names (may be empty):
      {{inputs.RUNNABLE_AGENT_SPECS}}

      Installed agents you may ALSO propose running, which haven't been
      granted inbox-run permission yet — proposing one becomes a one-click
      "Enable & run" (may be empty):
      {{inputs.RUNNABLE_CANDIDATES}}

      Input specs for those candidates (may be empty):
      {{inputs.RUNNABLE_CANDIDATE_SPECS}}

      IMPORTANT — TOOL USE POLICY: do NOT use Bash, Read, Grep, Glob,
      or any file/search tools. Everything you need is already in this
      prompt. You may propose any agent listed in `ALLOWED_SUB_AGENTS`
      OR `RUNNABLE_CANDIDATES` — together these are the complete,
      authoritative set you may run; do not go searching for more. If
      the operator names an agent that appears in `RUNNABLE_CANDIDATES`,
      propose it (it becomes "Enable & run") rather than saying you
      can't run it.

      {{inputs.SOURCE_PLAYBOOK}}

      ════════════════════════════════════════════════════════════════
      THIS THREAD — the live message + conversation (read this last)
      ════════════════════════════════════════════════════════════════

      id:       {{inputs.MESSAGE_ID}}
      priority: {{inputs.MESSAGE_PRIORITY}}
      source:   {{inputs.MESSAGE_SOURCE}}
      title:    {{inputs.MESSAGE_TITLE}}

      Original request (frozen at thread creation — background, may be stale):
      {{inputs.MESSAGE_BODY}}

      ── CURRENT REQUEST — the operator's latest ask, AUTHORITATIVE ──
      {{inputs.CURRENT_REQUEST}}

      The CURRENT REQUEST is what the operator wants RIGHT NOW. If it
      differs from the Original request above, the operator has pivoted —
      act on the CURRENT REQUEST and do not drag the thread back to the
      original goal. Use the conversation below for history and to see
      what already ran, not to re-derive the goal.

      Current time (operator's local time, ISO 8601 with offset):
      {{inputs.NOW}}

      When the operator gives a relative time ("before 4:30pm today",
      "tomorrow 9am", "in 2 hours", "next Monday"), resolve it against
      NOW into an absolute ISO 8601 timestamp WITH the same offset, and
      pass THAT as the target agent's due-date input (e.g. a reminder's
      `DUE_DATE`). Never pass a vague phrase as a due date. If NOW is
      empty and you can't resolve an absolute time, ask the operator for
      a concrete date/time rather than guessing.

      Context (may be empty / JSON / arbitrary):
      {{inputs.CONTEXT_JSON}}

      Conversation so far (may be empty — you are the first responder):
      {{inputs.CONVERSATION}}

      ────────────────────────────────────────────────────────────────
      Now respond with a single <plan>…</plan> block exactly as
      specified in the OUTPUT FORMAT section above. Output ONLY the
      <plan> block — no preamble, no fences.
    # 2 turns: turn 1 emits the <plan> block; turn 2 is a buffer if
    # the model accidentally calls a tool on turn 1 (it'll get refused
    # by the prompt instructions and re-emit clean on turn 2). Setting
    # this to 1 caused max-turns failures when the model probed the
    # filesystem before responding.
    maxTurns: 2
    timeout: 60
