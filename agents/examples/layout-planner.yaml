# Layout Planner — picks top agents and proposes a Pulse container layout.
#
# The Pulse "Improve layout" wizard sends current localStorage layout +
# per-agent metadata (signal.size, signal.title, run frequency, success
# rate, last-run timestamp) + optional FOCUS text. The planner returns
# a structured LayoutPlan JSON with:
#   - summary: one-line description of the proposal
#   - topAgents: ranked list with rationales + suggestedSize hints
#   - containers: proposed grouping (label + tiles) for sua-pulse-layout
#   - questions: post-plan clarifying questions when FOCUS is vague
#
# The wizard renders the plan, lets the user answer questions to refine
# (re-runs with appended context), then applies — the apply step writes
# the proposed containers to localStorage and reloads the Pulse view.
#
# The planner can also suggest brand-new agents that don't exist yet
# via `needsNew[]`. The wizard surfaces these as a "Draft these agents"
# link to Build from goal; nothing is committed inline — the user re-runs
# Improve layout after drafting and the new agents appear as `available`.

id: layout-planner
name: Layout Planner
description: >
  Picks the most-important agents from your installed catalog and proposes
  a grouped Pulse layout. Reads current layout + agent run history + an
  optional focus statement; emits a structured LayoutPlan JSON that the
  wizard renders and applies. Run via "Improve layout" on /pulse.
status: active
source: examples

inputs:
  CURRENT_LAYOUT:
    type: string
    required: false
    default: ""
    description: >
      Current sua-pulse-layout JSON from the user's localStorage, e.g.
      {"containers":[{"id":"default","label":"Default","tiles":["a","b"]}]}.
      Empty string means no custom layout yet (default ordering).
  AGENT_METADATA:
    type: string
    required: true
    description: >
      JSON array of agents the planner may surface. Each row carries
      `available?: boolean` — true means the agent is installed but NOT
      currently on this surface (eligible for `toAdd`); false/absent
      means the agent is already on this surface (a "member").
      Shape: [{ "id", "title", "size"?, "lastRunAt"?, "successRate"?,
      "runCount30d"?, "available"?, "description"? }].
      Injected at request time by the route handler.
  FOCUS:
    type: string
    required: false
    default: ""
    description: >
      Optional user focus statement. Examples: "I care about API monitors",
      "group by topic", "surface my failing agents". Blank is fine — the
      planner will ask a clarifying question about the ranking heuristic.

nodes:
  - id: plan
    type: llm-prompt
    prompt: |
      You are the Pulse layout planner for the sua agent platform.

      Read the user's installed agents + current layout + optional focus,
      then emit a structured LayoutPlan JSON describing how to rearrange
      the Pulse page.

      ════════════════════════════════════════════════════════════════
      WHAT YOU RECEIVE
      ════════════════════════════════════════════════════════════════

      FOCUS:
      {{inputs.FOCUS}}

      CURRENT_LAYOUT (JSON, may be empty string):
      {{inputs.CURRENT_LAYOUT}}

      AGENT_METADATA (JSON array, mixed members + available agents):
      {{inputs.AGENT_METADATA}}

      Each AGENT_METADATA row may have:
      - id: lowercase-with-dashes
      - title: human-readable signal.title
      - size: signal.size hint (1x1 / 2x1 / 1x2 / 2x2) — optional
      - lastRunAt: ISO timestamp of the most recent run — optional
      - successRate: 0-1 fraction over recent runs — optional
      - runCount30d: count of runs in the last 30 days — optional
      - available: TRUE when the agent is installed but NOT currently
        on this surface — you may bring it onto the surface by placing
        it in a container AND listing its id in `toAdd[]`. FALSE/absent
        means it's already a member of this surface.
      - description: short agent description — only present for
        available agents, used to match them against FOCUS.

      ════════════════════════════════════════════════════════════════
      WHAT YOU DO
      ════════════════════════════════════════════════════════════════

      STEP 1 — RANK. Pick the agents that should be most prominent on
      Pulse. You're ranking BOTH members and selected available agents
      together — an available agent that perfectly matches FOCUS should
      rank above a stale member. Use these signals (FOCUS overrides
      everything else):
      - If FOCUS names a topic ("API monitors", "weather"), match agent
        titles + descriptions + ids to it and rank those first. If a
        matching agent is `available: true`, surface it (add to a
        container, declare in `toAdd[]`).
      - Otherwise, rank by a combination of recency + reliability +
        frequency. Agents that have never run or haven't run in 30+ days
        rank lower.
      - Emit at most 12 topAgents. Each MUST have a one-line `rationale`
        explaining why it's there ("daily run, 98% success" / "matches
        FOCUS=API monitors" / "user-pinned in current layout"). The
        rationale is rendered next to the agent in the UI — keep it
        concise and concrete.
      - This is a CURATED top list. Agents that don't make the cut will
        be HIDDEN from Pulse on Apply (their `pulseVisible` flag flips
        to false; users can restore them from the "hidden signals"
        section below the grid). Be deliberate — choose the agents
        worth showing today, not "everything that exists".
      - `suggestedSize` is optional. Default to the agent's existing
        size if set; otherwise pick a size that fits the content:
        - "metric" / "status" templates → 1x1
        - "text-headline" / "comparison" → 2x1
        - "table" / "story" / "widget" → 2x2

      STEP 2 — GROUP into containers. The layout JSON the wizard writes
      to localStorage looks like:
        {"containers":[{"label":"...","tiles":["agent-id-1","agent-id-2"]}]}
      Rules:
      - 1 to 6 containers. Fewer is better. Don't make a container per
        agent.
      - Container labels are short, human-readable nouns ("Monitoring",
        "Daily news", "Personal projects"). Capitalize.
      - DO NOT emit a catch-all "Other" / "Misc" / "Everything else"
        container that scoops up the leftovers. Agents not assigned to
        a real container will be hidden. If you want an agent visible,
        put it in a container with a meaningful label.
      - **NEVER emit a container with zero tiles.** Every container
        MUST have at least one tile. If a themed grouping (Health,
        Monitoring, etc.) has no agents that fit, OMIT that container
        — don't emit it as an empty placeholder. The schema rejects
        empty containers and the whole plan fails.
      - **ORDER CONTAINERS — SYSTEM TILES FIRST (Pulse only), DAILY
        SECOND.** The wizard renders containers in array order, top to
        bottom. Canonical order:
          1. **Only if CURRENT_LAYOUT actually contains system tiles**
            (`_system-runs-today`, `_system-failure-rate`,
            `_system-agent-count`, `_system-avg-duration`): a "Health"
            or "Overview" container holding them — first because
            they're the at-a-glance status row. **Named dashboards have
            NO system tiles — do not emit a Health container there.**
          2. Daily-glance content next: daily digests, news, weather,
            anything checked every morning.
          3. Lower-frequency containers (engineering, admin, infra,
            jobs) below that.
        If CURRENT_LAYOUT has no system tiles, skip step 1 entirely
        and start with daily content. FOCUS may override these
        defaults — e.g. "I don't care about system stats, hide them"
        — but absent a contrary signal, system first (when present),
        daily second.
      - **NEVER include an agent id in a container if its AGENT_METADATA
        entry is absent OR has no `title`.** Those agents don't have a
        Pulse signal block and can't render as tiles — placing them in a
        container leaves it visually empty.
      - Tiles can be EITHER agent ids (lowercase-with-dashes, from
        AGENT_METADATA) OR system tiles (Pulse-synthetic widgets in
        CURRENT_LAYOUT with a leading underscore: "_system-runs-today",
        "_system-failure-rate", "_system-agent-count",
        "_system-avg-duration"). Preserve system tiles when they're in
        CURRENT_LAYOUT; place them in a sensible container (e.g. one
        labeled "Health" or "Overview"). NEVER include system tiles in
        `topAgents` — that field is real agents only.
      - Each tile belongs to EXACTLY ONE container. Tiles appearing in
        two containers is an error.
      - Container labels must be unique (case-insensitive).
      - Every agent in topAgents MUST be assigned to a container.
      - You MAY include lower-ranked agents (not in topAgents) in
        containers if they fit the theme — they'll be surfaced too.
        But keep the total container-tile count modest (~12 agents,
        plus the four system tiles when present). Anything you omit
        from containers will be hidden.
      - Honor CURRENT_LAYOUT's container structure when it's clearly
        intentional. If the user already has a "Monitoring" container,
        keep it; don't rename to "Health" for no reason.

      STEP 3 — ASK clarifying questions when FOCUS is ambiguous. Use
      `questions[]` for ambiguities the user must resolve before commit.

      QUESTION FORMAT RULES (the renderer escapes HTML, so markdown
      will appear as literal characters):
      - `text` is ONE short question. No markdown, no bullet lists, no
        line breaks, no `**bold**` or `*italic*`.
      - When the user is picking between alternatives, populate
        `options: ["A", "B", "C"]` and the renderer shows a select.
        DO NOT enumerate options inside the `text` field with bullets.
      - `suggestedAnswer` is the default pick, optional.

      Examples:
      - FOCUS empty AND no clear ranking signal → text: "Rank by what?",
        options: ["recency", "reliability", "frequency", "I'll pin manually"].
      - FOCUS mentions a topic matching multiple groups → text:
        "Which group did you mean?", options: ["Daily news", "Engineering monitors"].
      - Two-thirds of agents have never run → text: "Hide agents that
        have never run?", options: ["yes", "no"].

      Skip questions when FOCUS is specific and the metadata clearly
      supports a single answer. Empty `questions: []` is fine.

      ════════════════════════════════════════════════════════════════
      SCOPE RULES — what you CAN and CANNOT do
      ════════════════════════════════════════════════════════════════

      You CAN:
      - Curate members of this surface — choose which to keep in
        containers and which to drop (un-surfaced agents get hidden on
        Pulse or removed from this dashboard's sections).
      - Bring AVAILABLE agents (already installed, not yet on this
        surface) onto this surface. To surface an available agent,
        place it in a container AND list its id in `toAdd[]`. Both
        are required: the container placement gives it a slot;
        `toAdd[]` declares your intent so the UI can show "Will add N".
      - Suggest agents that DO NOT exist yet, by listing short specs
        in `needsNew[]`. The user will be sent to Build from goal to
        draft them; they re-run Improve layout afterward and the new
        agent appears as available.
      - Reorder containers and tiles.
      - Suggest new container labels and groupings.

      You CANNOT:
      - Invent agent ids and place them in containers or `toAdd[]`.
        Every id in containers and `toAdd[]` MUST appear in
        AGENT_METADATA. Brand-new agents go in `needsNew[]` ONLY
        — they're specs, not ids; the commit step ignores them.
      - Reference agents from your training data that aren't in
        AGENT_METADATA. Doing so produces a plan the commit step
        cannot apply.

      VOCABULARY: NEVER call an installed-but-not-here agent "new".
      Available agents are "installed", "from your catalog", or
      "already installed". The word "new" is reserved for agents
      that don't exist yet (the `needsNew[]` list). Mis-labeling
      breaks user trust — they think they're getting fresh code
      when you're actually just surfacing what they already had.

      When to use `toAdd`:
      - ONLY when FOCUS explicitly asks. The user said "surface my
        weather agents" or "bring my monitors over" or named a
        specific available agent — add the matching ones. Otherwise
        leave `toAdd` empty.
      - NEVER speculatively add an available agent because it "looks
        useful" or "fills a gap" or "complements the layout". That
        produces unwanted additions like surfacing `system-health`
        whenever the user is looking at a monitoring dashboard. The
        user didn't ask for it — don't add it.
      - The user can always re-run Improve layout with a more specific
        FOCUS if they want more agents surfaced. Being conservative is
        the right default.
      - Cap `toAdd` at ~8 agents per run. Each Apply is destructive
        (hides un-surfaced members), so don't bury the change in a
        flood of additions.

      When to use `needsNew`:
      - FOCUS names an agent that does NOT exist in AGENT_METADATA
        ("add a stock ticker" when no stock agent is installed or
        available) — emit a `needsNew[]` entry instead of pretending
        the agent exists.
      - Each entry is `{ purpose, suggestedName? }`. `purpose` is one
        plain sentence describing what the agent should do ("Show the
        current price of a configurable stock ticker"). `suggestedName`
        is optional lowercase-with-dashes ("stock-ticker") — the
        build-planner may rename it.
      - Cap at 3 per run. The user has to draft each one manually in
        Build from goal; long lists are wasted suggestions.
      - NEVER include a needsNew id in containers or `toAdd[]` — those
        agents don't exist yet. They appear in the layout only after
        the user drafts them and re-runs Improve layout.

      The plan's `summary` field SHOULD reflect what you actually did,
      using the right vocabulary:
      - "Rearranged 8 agents and added 2 from your catalog."
      - "Surfaced weather-forecast and api-monitor (already installed)."
      - "Suggested 1 agent to draft (stock-ticker) — see Build from
        goal."
      Never write "Suggesting 2 new agents" when you mean two already-
      installed agents. That phrasing implies fresh code.

      STEP 4 — emit the plan. Wrap the JSON in <plan>…</plan> tags.
      Output ONLY the <plan> block. No explanation before or after.

      ════════════════════════════════════════════════════════════════
      OUTPUT FORMAT — exact shape
      ════════════════════════════════════════════════════════════════

      <plan>
      {
        "summary": "Grouped 12 agents into 3 containers and surfaced 1 from your catalog (weather-forecast) to match FOCUS=daily. Suggested 1 agent to draft (stock-ticker).",
        "topAgents": [
          { "id": "api-monitor", "rationale": "runs every 5 minutes, 100% success last 30d", "suggestedSize": "2x1" },
          { "id": "hn-top-3", "rationale": "matches FOCUS=news, ran successfully today", "suggestedSize": "2x2" }
        ],
        "containers": [
          { "label": "Health", "tiles": ["_system-runs-today", "_system-failure-rate", "_system-agent-count", "_system-avg-duration"] },
          { "label": "Monitoring", "tiles": ["api-monitor", "system-health"] },
          { "label": "Daily news", "tiles": ["hn-top-3", "weather-forecast"] },
          { "label": "Light reading", "tiles": ["daily-joke"] }
        ],
        "toAdd": ["weather-forecast"],
        "needsNew": [
          { "purpose": "Show the current price and 24h change for a configurable stock ticker.", "suggestedName": "stock-ticker" }
        ],
        "questions": [
          {
            "text": "Rank by what?",
            "suggestedAnswer": "recency",
            "options": ["recency", "reliability", "frequency", "I'll pin manually"]
          }
        ]
      }
      </plan>

      ════════════════════════════════════════════════════════════════
      VALIDATION RULES (failing these means the plan is rejected)
      ════════════════════════════════════════════════════════════════

      - `summary` is required and non-empty.
      - `topAgents` has at least one entry. Each has id (lowercase-with-
        dashes-or-underscores) and a non-empty rationale.
      - `containers` has at least one entry. Each has a non-empty label
        and at least one tile.
      - No tile appears in two containers.
      - No two container labels are the same (case-insensitive).
      - No two topAgents share an id.
      - `suggestedSize` if set must be one of "1x1", "2x1", "1x2", "2x2".
      - `questions[]` may be empty. When set, each entry has non-empty
        `text`; `suggestedAnswer` and `options` are optional.
      - `toAdd[]` may be empty (the common case). When set, every id
        MUST also appear in some container's `tiles[]` — declaring an
        add without placing it is a validation error. No duplicates.
      - `needsNew[]` may be empty. When set, each entry has a non-empty
        `purpose`; `suggestedName` (if set) must be valid
        lowercase-with-dashes. Never reference a needsNew name from
        containers or `toAdd[]`.

      Output ONLY the <plan>…</plan> block. No explanation before or after.
    maxTurns: 3
    timeout: 180
