id: system-health
name: System Health
description: >
  Checks local system disk usage, memory, and CPU load.
  Outputs a JSON object with key metrics. Signal tile shows
  disk usage percentage on the Pulse dashboard.
status: active
source: examples

signal:
  title: System Health
  icon: "\uD83D\uDCBE"
  template: metric
  mapping:
    value: disk_percent
    label: Disk Usage
    unit: "%"
  refresh: 1h
  size: 1x1

outputWidget:
  type: dashboard
  fields:
    - name: disk_percent
      label: Disk Usage
      type: metric
    - name: load_avg
      label: CPU Load
      type: stat
    - name: mem_gb
      label: Memory
      type: stat

nodes:
  - id: check
    type: shell
    command: |
      DISK=$(df -h / | awk 'NR==2 {print $5}' | tr -d '%')
      MEM_TOTAL=$(sysctl -n hw.memsize 2>/dev/null || free -b 2>/dev/null | awk '/Mem:/{print $2}')
      MEM_GB=$(echo "scale=0; ${MEM_TOTAL:-0} / 1073741824" | bc 2>/dev/null || echo "?")
      LOAD=$(sysctl -n vm.loadavg 2>/dev/null | awk '{print $2}' || uptime | awk -F'load average:' '{print $2}' | awk -F, '{print $1}' | tr -d ' ')
      echo "{\"disk_percent\": \"${DISK:-0}%\", \"load_avg\": \"${LOAD:-unknown}\", \"mem_gb\": \"${MEM_GB} GB\", \"mem_bytes\": ${MEM_TOTAL:-0}}"
    timeout: 15
