services:
  temporal:
    image: temporalio/auto-setup:1.28.0
    container_name: sua-temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - SKIP_DEFAULT_NAMESPACE_CREATION=false
      - LOG_LEVEL=warn
    depends_on:
      temporal-db:
        condition: service_healthy
    restart: unless-stopped

  temporal-db:
    image: postgres:16-alpine
    container_name: sua-temporal-db
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
    ports:
      - "5432:5432"
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.40.0
    container_name: sua-temporal-ui
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000,http://localhost:3003
    depends_on:
      - temporal
    restart: unless-stopped

volumes:
  temporal-db-data:
